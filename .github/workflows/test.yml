name: Tests

on:
  pull_request:
    paths-ignore:
      - "*.md"
      - "LICENSE.txt"
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - "LICENSE.txt"

jobs:
  # Main test suite - tests Ruby versions and Rails compatibility with SQLite
  sqlite:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ruby_version: ["3.3", "3.4", "4.0"]
        gemfile:
          - Gemfile
          - gemfiles/rails_7.1.gemfile
          - gemfiles/rails_7.2.gemfile
          - gemfiles/rails_8.0.gemfile
          - gemfiles/rails_8.1.gemfile

    env:
      RAILS_ENV: test
      BUNDLE_GEMFILE: ${{ github.workspace }}/${{ matrix.gemfile }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby_version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby_version }}
          bundler-cache: true

      - name: Prepare database and run tests
        run: bundle exec rake db:create db:migrate test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-sqlite-ruby-${{ matrix.ruby_version }}-${{ strategy.job-index }}
          path: test/reports/
          retention-days: 7

  # PostgreSQL compatibility tests
  postgres:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ruby_version: ["3.4"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sessions_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/sessions_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby_version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby_version }}
          bundler-cache: true

      - name: Prepare database
        run: bundle exec rake db:migrate:reset

      - name: Run tests
        run: bundle exec rake test

  # MySQL compatibility tests
  mysql:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ruby_version: ["3.4"]

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sessions_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: test
      DATABASE_URL: mysql2://root:root@127.0.0.1:3306/sessions_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby_version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby_version }}
          bundler-cache: true

      - name: Prepare database
        run: bundle exec rake db:migrate:reset

      - name: Run tests
        run: bundle exec rake test
